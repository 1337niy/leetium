[package]
edition.workspace = true
name              = "leetium-tools"
version.workspace = true

[features]
default       = ["browser", "cron", "metrics", "wasm"]
browser       = ["dep:leetium-browser"]
cron          = ["dep:leetium-cron"]
embedded-wasm = []
metrics       = ["dep:leetium-metrics"]
wasm          = ["dep:shell-words", "dep:wasmtime", "dep:wasmtime-wasi", "wasmtime/component-model"]

[dependencies]
anyhow                = { workspace = true }
async-trait           = { workspace = true }
base64                = { workspace = true }
bytes                 = { workspace = true }
futures               = { workspace = true }
image                 = { workspace = true }
ipnet                 = { workspace = true }
leetium-agents         = { workspace = true }
leetium-browser        = { optional = true, workspace = true }
leetium-common         = { workspace = true }
leetium-config         = { workspace = true }
leetium-cron           = { optional = true, workspace = true }
leetium-metrics        = { optional = true, workspace = true }
leetium-network-filter = { workspace = true }
leetium-providers      = { workspace = true }
leetium-sessions       = { workspace = true }
leetium-skills         = { workspace = true }
regex                 = { workspace = true }
reqwest               = { features = ["blocking"], workspace = true }
secrecy               = { workspace = true }
serde                 = { workspace = true }
serde_json            = { workspace = true }
sha2                  = { workspace = true }
shell-words           = { optional = true, workspace = true }
sqlx                  = { workspace = true }
thiserror             = { workspace = true }
time                  = { workspace = true }
tokio                 = { workspace = true }
tracing               = { workspace = true }
url                   = { workspace = true }
uuid                  = { workspace = true }
wasmtime              = { optional = true, workspace = true }
wasmtime-wasi         = { optional = true, workspace = true }

[dev-dependencies]
mockito      = { workspace = true }
rstest       = { workspace = true }
tempfile     = { workspace = true }
tokio        = { features = ["macros", "rt-multi-thread"], workspace = true }
tokio-stream = { workspace = true }

[lints]
workspace = true
