<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="refresh" content="0; url=/index.en.html">
    <link rel="canonical" href="https://leetnex.ru/index.en.html">
    <link rel="alternate" hreflang="en" href="https://leetnex.ru/index.en.html">
    <link rel="alternate" hreflang="fr" href="https://leetnex.ru/index.fr.html">
    <link rel="alternate" hreflang="zh" href="https://leetnex.ru/index.zh.html">
    <link rel="alternate" hreflang="es" href="https://leetnex.ru/index.es.html">
    <link rel="alternate" hreflang="de" href="https://leetnex.ru/index.de.html">

    <link rel="alternate" hreflang="pt" href="https://leetnex.ru/index.pt.html">
    <link rel="alternate" hreflang="ja" href="https://leetnex.ru/index.ja.html">
    <link rel="alternate" hreflang="ko" href="https://leetnex.ru/index.ko.html">
    <link rel="alternate" hreflang="ru" href="https://leetnex.ru/index.ru.html">
    <title>Leetium</title>
    <script>
        (function () {
            var supported = ['en', 'fr', 'zh', 'es', 'de', 'it', 'pt', 'ja', 'ko', 'ru'];
            var lang = "en";
            var m = document.cookie.match(/(?:^|;\s*)lang=([a-z]{2})(?:;|$)/);
            if (m && supported.indexOf(m[1]) !== -1) {
                lang = m[1];
            } else {
                var bl = (navigator.language || "").toLowerCase().split("-")[0];
                if (supported.indexOf(bl) !== -1) lang = bl;
            }
            location.replace("/index." + lang + ".html");
        })();
    </script>
</head>

</html>
