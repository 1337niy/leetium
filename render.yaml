services:
  - type: web
    name: leetium
    runtime: image
    image:
      url: ghcr.io/1337niy/leetium:0.1.0
    plan: free
    healthCheckPath: /health
    envVars:
      - key: LEETIUM_NO_TLS
        value: "true"
      - key: LEETIUM_CONFIG_DIR
        value: /tmp/leetium/config
      - key: LEETIUM_DATA_DIR
        value: /tmp/leetium
      - key: LEETIUM_BEHIND_PROXY
        value: "true"
      - key: LEETIUM_DEPLOY_PLATFORM
        value: render
    dockerCommand: leetium --bind 0.0.0.0 --port 10000 --no-tls
