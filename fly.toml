[build]
image = 'ghcr.io/1337niy/leetium:0.1.0'

[env]
LEETIUM_BEHIND_PROXY    = 'true'
LEETIUM_CONFIG_DIR      = '/data/config'
LEETIUM_DATA_DIR        = '/data'
LEETIUM_DEPLOY_PLATFORM = 'flyio'
LEETIUM_NO_TLS          = 'true'

[processes]
app = '--bind 0.0.0.0 --port 8080 --no-tls'

[[mounts]]
destination = '/data'
source      = 'leetium_data'

[http_service]
auto_start_machines  = true
auto_stop_machines   = 'stop'
force_https          = true
internal_port        = 8080
min_machines_running = 0
processes            = ['app']

[http_service.concurrency]
hard_limit = 250
soft_limit = 200
type       = 'connections'

[[http_service.checks]]
grace_period = '10s'
interval     = '30s'
method       = 'GET'
path         = '/health'
timeout      = '5s'
