# NOTE: DigitalOcean App Platform does not support persistent disks for
# image-based services. Data (databases, sessions, memory) is ephemeral
# and will be lost on each redeploy. For persistent storage, use a
# Droplet with Docker instead.
spec:
  name: leetium
  services:
    - name: leetium
      image:
        registry_type: GHCR
        registry: ghcr.io
        repository: 1337leetium/leetium
        tag: "0.1.0"
      instance_count: 1
      instance_size_slug: basic-xxs
      http_port: 8080
      run_command: leetium --bind 0.0.0.0 --port 8080 --no-tls
      health_check:
        http_path: /health
      envs:
        - key: LEETIUM_DATA_DIR
          value: /data
        - key: LEETIUM_DEPLOY_PLATFORM
          value: digitalocean
        - key: LEETIUM_WEBAUTHN_RP_ID
          value: ${APP_DOMAIN}
        - key: LEETIUM_WEBAUTHN_ORIGIN
          value: ${APP_URL}
