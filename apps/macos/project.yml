name: Leetium
options:
  minimumXcodeGenVersion: 2.42.0
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.10"
    HEADER_SEARCH_PATHS:
      - "$(inherited)"
      - "$(SRCROOT)/Generated"
    LIBRARY_SEARCH_PATHS:
      - "$(inherited)"
      - "$(SRCROOT)/Generated"

packages: {}

targets:
  Leetium:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.leetium.app
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_EMIT_LOC_STRINGS: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Bridging-Header.h
        OTHER_LDFLAGS:
          - "-lleetium_bridge"
          - "-lsqlite3"
          - "-lz"
          - "-lc++"
          - "-framework"
          - "Accelerate"
          - "-framework"
          - "SystemConfiguration"
          - "-framework"
          - "Security"
          - "-framework"
          - "CoreFoundation"
          - "-framework"
          - "IOKit"
          - "-framework"
          - "CoreServices"
    scheme:
      testTargets:
        - LeetiumTests
        - LeetiumUITests

  LeetiumTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: Leetium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.leetium.app.tests
        GENERATE_INFOPLIST_FILE: YES

  LeetiumUITests:
    type: bundle.ui-testing
    platform: macOS
    sources:
      - path: UITests
    dependencies:
      - target: Leetium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.leetium.app.uitests
        GENERATE_INFOPLIST_FILE: YES
